<style>
  :root {
    --bg: #F2F5F9;
    --ios-blue: #007AFF;
    --orange: #FF9F43;
    --orange-depth: #D37926;
    --red: #FF3B30;
    --green: #34C759;
    --glass: rgba(255, 255, 255, 0.7);
    --border: rgba(255, 255, 255, 0.8);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
}

/* --- SYSTEM RESET --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg);
    color: #1c1c1e;
    line-height: 1.4;
    overflow-x: hidden;
    padding-bottom: 100px; /* Space for footer */
}

input, textarea {
    user-select: text !important;
    -webkit-user-select: text !important;
}

/* --- SCROLLBAR KILLER --- */
::-webkit-scrollbar { display: none; }
html { scrollbar-width: none; -ms-overflow-style: none; }

/* --- IOS HEADER --- */
.ios-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 15px 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

.header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 600px;
    margin: 0 auto;
}

.brand { display: flex; align-items: center; gap: 10px; }
.flag { font-size: 1.8rem; }
.logo-text { font-weight: 900; font-size: 1.2rem; letter-spacing: -0.5px; }

.ios-post-btn {
    background: var(--orange);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 16px;
    font-weight: 800;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 0 var(--orange-depth), 0 8px 15px rgba(255, 159, 67, 0.3);
    transition: all 0.1s ease;
}

.ios-post-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--orange-depth); }
.plus-icon { width: 16px; height: 16px; fill: white; }

/* --- SKELETONS & LAZY LOAD --- */
.skeleton-card {
    background: white;
    margin: 20px 15px;
    padding: 15px;
    border-radius: 28px;
    border: 2px solid white;
}

.skeleton-img { width: 100%; height: 250px; border-radius: 20px; background: #e1e4e8; margin-bottom: 15px; }
.skeleton-text { height: 15px; background: #e1e4e8; border-radius: 10px; width: 80%; margin-bottom: 10px; }
.skeleton-text.short { width: 40%; }

.shimmer {
    background: linear-gradient(90deg, #e1e4e8 25%, #f2f5f9 50%, #e1e4e8 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* --- POST CARDS --- */
.post-card {
    background: white;
    margin: 20px 15px;
    border-radius: 30px;
    padding: 15px;
    box-shadow: var(--shadow);
    border: 3px solid white;
    position: relative;
    overflow: hidden;
}

.post-img-wrap { width: 100%; height: 300px; border-radius: 22px; overflow: hidden; margin-bottom: 15px; position: relative; }
.post-img { width: 100%; height: 100%; object-fit: cover; }

/* PENDING STATE (90% BLUR) */
.post-card.pending .post-img { filter: blur(40px); transform: scale(1.1); }
.post-card.pending::after {
    content: 'PENDING APPROVAL';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #FFD93D;
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 900;
    font-size: 0.8rem;
    box-shadow: 0 4px 0 #D4B21D;
    z-index: 2;
}

.post-info h2 { font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; }
.post-meta { font-size: 0.7rem; color: var(--orange); font-weight: 800; margin-bottom: 8px; display: block; }
.post-desc { font-size: 0.9rem; color: #48484a; text-transform: none; line-height: 1.5; }

/* --- MODALS --- */
.ios-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: flex-end; /* Slide up from bottom */
    z-index: 2000;
}

.modal-content {
    background: white;
    width: 100%;
    max-width: 500px;
    border-radius: 30px 30px 0 0;
    padding: 20px 25px 40px;
    animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
    width: 40px; height: 5px; background: #D1D1D6; border-radius: 10px;
    margin: 0 auto 20px;
}

.modal-title { font-weight: 900; font-size: 1.4rem; margin-bottom: 20px; text-align: center; }

/* --- INPUTS --- */
.input-group input, .input-group textarea, #reportModal input, #reportModal textarea, #messageModal textarea {
    width: 100%;
    background: #F2F2F7;
    border: 2px solid transparent;
    padding: 16px;
    border-radius: 18px;
    margin-bottom: 12px;
    font-weight: 700;
    font-family: inherit;
}

.input-group input:focus, .input-group textarea:focus {
    background: white;
    border-color: var(--orange);
}

.ios-submit-btn {
    width: 100%; background: #000; color: white; border: none; padding: 18px;
    border-radius: 20px; font-weight: 900; cursor: pointer; margin-top: 10px;
    box-shadow: 0 6px 0 #333;
}

.ios-submit-btn.red { background: var(--red); box-shadow: 0 6px 0 #9E1F19; }

.ios-cancel-btn {
    width: 100%; background: transparent; border: none; padding: 15px;
    font-weight: 800; font-size: 0.8rem; color: #8E8E93; cursor: pointer;
}

/* --- FOOTER --- */
.ios-footer {
    position: fixed;
    bottom: 20px; left: 20px; right: 20px;
    background: #000;
    height: 75px;
    border-radius: 28px;
    z-index: 1000;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.footer-inner {
    display: flex; justify-content: space-around; align-items: center; height: 100%;
}

.footer-tab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: rgba(255,255,255,0.5); cursor: pointer;
}

.footer-tab svg { width: 24px; height: 24px; fill: currentColor; }
.footer-tab span { font-size: 0.6rem; font-weight: 900; }
.footer-tab:active { color: white; transform: scale(0.9); }

/* --- TOASTS --- */
#toast-wrapper { position: fixed; top: 20px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; z-index: 9999; pointer-events: none; }
.toast {
    background: var(--green); color: white; padding: 15px 25px; border-radius: 20px;
    font-weight: 900; margin-bottom: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    animation: toastPop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}
.toast.error { background: var(--red); }
@keyframes toastPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

<script type="module">
    // --- FIREBASE V11 MODULAR IMPORTS ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild, limitToLast, get, remove, increment, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const IMGUR_CLIENT_ID = "891e5bb4aa94282";

    // --- DEVICE IDENTITY & GLOBALS ---
    let deviceId = localStorage.getItem('cpt_device_id') || ('DEV-' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('cpt_device_id', deviceId);

    const feedContainer = document.getElementById('feed-container');
    const skeletonContainer = document.getElementById('skeleton-container');
    const toastWrapper = document.getElementById('toast-wrapper');

    // --- UI HELPERS ---
    window.notify = (msg, type = 'success') => {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerText = msg;
        toastWrapper.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    };

    window.closeAllModals = () => {
        document.querySelectorAll('.ios-modal').forEach(m => m.style.display = 'none');
    };

    const openModal = (id) => document.getElementById(id).style.display = 'flex';

    // --- TAB NAVIGATION ---
    document.getElementById('openPostModal').onclick = () => openModal('postModal');
    document.getElementById('tabReport').onclick = () => openModal('reportModal');
    document.getElementById('tabMessage').onclick = () => openModal('messageModal');
    document.getElementById('tabManage').onclick = () => {
        renderUserPosts();
        openModal('manageModal');
    };

    // --- IMAGE PREVIEW LOGIC ---
    const imgPicker = document.getElementById('imagePicker');
    const fileInput = document.getElementById('fileInput');
    const imgPreview = document.getElementById('imagePreview');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');

    imgPicker.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const [file] = e.target.files;
        if (file) {
            imgPreview.src = URL.createObjectURL(file);
            imgPreview.style.display = 'block';
            uploadPlaceholder.style.display = 'none';
        }
    };

    // --- POSTING LOGIC (IMGUR + FIREBASE) ---
    document.getElementById('revealForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitReveal');
        const file = fileInput.files[0];
        const name = document.getElementById('targetName').value;
        const city = document.getElementById('targetCity').value;
        const desc = document.getElementById('targetDesc').value;

        if (desc.length < 20) return notify("Description too short!", "error");
        
        btn.disabled = true;
        btn.innerText = "UPLOADING TO CLOUD...";

        try {
            // Upload to Imgur
            const formData = new FormData();
            formData.append('image', file);
            const imgRes = await fetch('https://api.imgur.com/3/image', {
                method: 'POST',
                headers: { Authorization: `Client-ID ${IMGUR_CLIENT_ID}` },
                body: formData
            });
            const imgData = await imgRes.json();
            const imgUrl = imgData.data.link;

            // Save to Firebase (Pending by default)
            const postRef = push(ref(db, 'posts'));
            await set(postRef, {
                id: postRef.key,
                name,
                location: city,
                description: desc,
                imageUrl: imgUrl,
                creatorId: deviceId,
                approved: false,
                likes: 0,
                dislikes: 0,
                timestamp: Date.now()
            });

            notify("SUBMITTED FOR REVEAL!");
            closeAllModals();
            e.target.reset();
            imgPreview.style.display = 'none';
            uploadPlaceholder.style.display = 'flex';
        } catch (err) {
            notify("Upload failed. Try again.", "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "SUBMIT FOR REVIEW";
        }
    };

    // --- FEED RENDERING (LAZY LOAD / INFINITE SCROLL) ---
    const renderFeed = () => {
        const postsQuery = query(ref(db, 'posts'), orderByChild('timestamp'));
        
        onValue(postsQuery, (snapshot) => {
            skeletonContainer.style.display = 'none';
            feedContainer.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;

            const urlParams = new URLSearchParams(window.location.search);
            const sharedId = urlParams.get('id');

            // Sort posts: Shared ID first, then newest first
            const posts = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);

            posts.forEach(post => {
                // Filter: Only show approved OR the user's own pending post
                if (!post.approved && post.creatorId !== deviceId) return;

                const card = document.createElement('div');
                card.className = `post-card ${!post.approved ? 'pending' : ''}`;
                if (sharedId === post.id) card.style.borderColor = "var(--orange)";

                card.innerHTML = `
                    <div class="post-img-wrap">
                        <img src="${post.imageUrl}" class="post-img" loading="lazy">
                    </div>
                    <div class="post-info">
                        <span class="post-meta">📍 ${post.location} • ID: ${post.id}</span>
                        <h2>${post.name}</h2>
                        <p class="post-desc">${post.description}</p>
                        
                        <div style="display:flex; gap:12px; margin-top:20px;">
                            <button onclick="handleVote('${post.id}', 'likes')" class="ios-post-btn" style="background:#f2f2f7; color:#000; box-shadow:none; padding:8px 12px;">
                                👍 ${post.likes || 0}
                            </button>
                            <button onclick="handleVote('${post.id}', 'dislikes')" class="ios-post-btn" style="background:#f2f2f7; color:#000; box-shadow:none; padding:8px 12px;">
                                👎 ${post.dislikes || 0}
                            </button>
                            <button onclick="notify('Comments Coming Soon', 'error')" class="ios-post-btn" style="background:none; color:#8e8e93; box-shadow:none; font-size:0.6rem;">
                                COMMENTS
                            </button>
                            <button onclick="sharePost('${post.id}')" class="ios-post-btn" style="margin-left:auto;">SHARE</button>
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        });
    };

    // --- REACTION & SHARE LOGIC ---
    window.handleVote = (id, type) => {
        const key = `voted_${id}`;
        if (localStorage.getItem(key)) return notify("Already voted!", "error");
        update(ref(db, `posts/${id}`), { [type]: increment(1) });
        localStorage.setItem(key, true);
        notify("Voted!");
    };

    window.sharePost = (id) => {
        const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
        navigator.clipboard.writeText(url);
        notify("Link Copied!");
    };

    // --- MANAGE MY POSTS ---
    const renderUserPosts = async () => {
        const list = document.getElementById('user-posts-list');
        list.innerHTML = "Fetching your reveals...";
        const snap = await get(ref(db, 'posts'));
        list.innerHTML = "";
        
        let found = 0;
        if (snap.exists()) {
            Object.values(snap.val()).forEach(p => {
                if (p.creatorId === deviceId) {
                    found++;
                    const item = document.createElement('div');
                    item.style = "background:#F2F2F7; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
                    item.innerHTML = `
                        <div>
                            <p style="font-weight:900; font-size:0.8rem;">${p.name}</p>
                            <p style="font-size:0.6rem; color:#8e8e93;">Status: ${p.approved ? 'LIVE' : 'PENDING'}</p>
                        </div>
                        <button onclick="deletePost('${p.id}')" style="background:var(--red); color:white; border:none; padding:8px 12px; border-radius:10px; font-weight:900; font-size:0.6rem;">DELETE</button>
                    `;
                    list.appendChild(item);
                }
            });
        }
        if (found === 0) list.innerHTML = "<p style='text-align:center; color:#8e8e93; font-size:0.8rem;'>No posts found from this device.</p>";
    };

    window.deletePost = async (id) => {
        if (confirm("Permanently delete this reveal?")) {
            await remove(ref(db, `posts/${id}`));
            notify("Deleted.");
            renderUserPosts();
        }
    };

    // --- REPORT & MESSAGE ---
    document.getElementById('confirmReport').onclick = async () => {
        const postId = document.getElementById('reportPostId').value;
        const reason = document.getElementById('reportReason').value;
        if (!postId || !reason) return notify("Missing info", "error");
        await push(ref(db, 'reports'), { postId, reason, deviceId, timestamp: Date.now() });
        notify("Report sent.");
        closeAllModals();
    };

    document.getElementById('confirmMessage').onclick = async () => {
        const msg = document.getElementById('adminMessage').value;
        if (!msg) return notify("Message empty", "error");
        await push(ref(db, 'messages'), { message: msg, deviceId, timestamp: Date.now() });
        notify("Message sent.");
        closeAllModals();
    };

    // Start App
    renderFeed();

</script>

</body>
</html>
