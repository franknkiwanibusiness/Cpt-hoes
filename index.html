<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide HTML Pages - File Upload</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: center; margin-bottom: 10px; font-size: 2em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.9em; }

        .auth-bar {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            margin-bottom: 20px; padding: 12px 16px; background: rgba(255,255,255,0.05);
            border-radius: 12px; backdrop-filter: blur(10px); flex-wrap: wrap;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #3a7bd5; }
        .auth-forms { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .auth-forms input {
            padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: #eee; font-size: 14px; width: 180px;
        }
        .auth-forms input:focus { outline: none; border-color: #00d2ff; }
        button {
            padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; transition: all 0.2s; font-size: 14px;
        }
        .google-btn { background: #4285f4; color: white; }
        .email-btn { background: #3a7bd5; color: white; }
        .logout-btn, .upgrade-btn { background: rgba(255,255,255,0.1); color: #eee; }
        .premium-badge { background: gold; color: #000; padding: 2px 8px; border-radius: 20px; font-weight: bold; }

        .upload-section {
            background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px;
            margin-bottom: 24px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .upload-section h2 { margin-bottom: 12px; color: #00d2ff; }
        textarea {
            width: 100%; height: 150px; background: rgba(0,0,0,0.3); color: #eee;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 12px;
            font-family: 'Courier New', monospace; font-size: 14px; resize: vertical; margin-bottom: 10px;
        }
        textarea:focus { outline: none; border-color: #00d2ff; }
        .upload-btn {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: white;
            padding: 12px 28px; border-radius: 10px; font-size: 16px; cursor: pointer;
        }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-upload-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .file-label {
            background: rgba(255,255,255,0.1); color: #ddd; padding: 10px 18px;
            border-radius: 10px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center;
            gap: 8px; transition: background 0.2s;
        }
        .file-label:hover { background: rgba(255,255,255,0.2); }
        #uploadStatus { margin-top: 10px; font-size: 0.9em; }
        .status-success { color: #4ade80; } .status-error { color: #f87171; } .status-loading { color: #fbbf24; }

        .pages-section h2 { margin-bottom: 16px; color: #00d2ff; }
        .pages-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
        }
        .page-card {
            background: rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s;
        }
        .page-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .page-card iframe {
            width: 100%; height: 200px; border: none; background: white;
        }
        .ad-slot {
            background: rgba(0,0,0,0.4); color: #aaa; display: flex;
            align-items: center; justify-content: center; font-size: 14px;
            min-height: 60px; width: 100%;
        }
        .ad-top { border-bottom: 1px dashed #555; }
        .ad-bottom { border-top: 1px dashed #555; }
        .countdown-container {
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; background: rgba(0,0,0,0.3); gap: 6px;
        }
        .timer-text { font-size: 1.2em; font-weight: bold; color: #00d2ff; }
        .skip-btn {
            background: transparent; border: 1px solid #fbbf24; color: #fbbf24;
            padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;
        }
        .skip-btn:hover { background: rgba(251,191,36,0.2); }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px; color: #666; }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 14px; height: 280px;
        }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
    </style>
</head>
<body>
<div class="container">
    <h1>🌍 Worldwide HTML Pages</h1>
    <p class="subtitle">Free: 10‑sec wait + ads | Premium: instant load</p>

    <!-- Auth Bar -->
    <div class="auth-bar" id="authBar">
        <div class="user-info" id="userInfo" style="display:none;">
            <img id="userAvatar" src="" alt="avatar">
            <span class="email-display" id="userEmailDisplay"></span>
            <span id="premiumBadge" style="display:none;" class="premium-badge">⭐ PREMIUM</span>
            <button class="upgrade-btn" id="upgradeBtn" style="display:none;" onclick="window.upgradeToPremium()">💎 Go Premium</button>
            <button class="logout-btn" onclick="window.signOutUser()">🚪 Sign out</button>
        </div>
        <div class="auth-forms" id="authForms">
            <input type="email" id="emailInput" placeholder="Email" autocomplete="email">
            <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
            <button class="email-btn" onclick="window.signUpWithEmail()">📧 Sign Up</button>
            <button class="email-btn" onclick="window.signInWithEmail()">🔑 Log In</button>
            <button class="google-btn" onclick="window.signInWithGoogle()">🔐 Google</button>
        </div>
    </div>

    <!-- Upload Section -->
    <div class="upload-section">
        <h2>📝 Create a new page</h2>
        <div class="file-upload-row">
            <label for="htmlFileInput" class="file-label">
                📁 Choose HTML file
            </label>
            <input type="file" id="htmlFileInput" accept=".html,.htm" style="display:none;">
            <span id="fileNameDisplay" style="color:#aaa; font-size:0.9em;"></span>
        </div>
        <textarea id="htmlInput" placeholder="Paste your HTML code here... or use the button above to select a file."></textarea>
        <button class="upload-btn" id="uploadBtn" onclick="window.uploadAndStore()">🚀 Upload & Publish</button>
        <div id="uploadStatus"></div>
    </div>

    <!-- Pages list -->
    <div class="pages-section">
        <h2>📄 All published pages (real‑time)</h2>
        <div class="pages-grid" id="pagesGrid">
            <div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, serverTimestamp, get, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";
    import {
        getAuth,
        signInWithPopup, GoogleAuthProvider,
        signInWithEmailAndPassword, createUserWithEmailAndPassword,
        signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFHskUWiyHhZke3KT9kkOtFI_gPsKfiGo",
        authDomain: "itzhoyoo-f9f7e.firebaseapp.com",
        databaseURL: "https://itzhoyoo-f9f7e-default-rtdb.firebaseio.com",
        projectId: "itzhoyoo-f9f7e",
        storageBucket: "itzhoyoo-f9f7e.filestorage.app",
        messagingSenderId: "1094792075584",
        appId: "1:1094792075584:web:d49e9c3f899d3cd31082a5",
        measurementId: "G-LLT6F9WRKH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let isPremium = false;

    // Premium check
    async function checkPremium(user) {
        if (!user) { isPremium = false; return; }
        const userRef = ref(db, `users/${user.uid}/premium`);
        const snapshot = await get(userRef);
        isPremium = snapshot.exists() ? snapshot.val() === true : false;
        updatePremiumUI();
    }
    function updatePremiumUI() {
        const badge = document.getElementById('premiumBadge');
        const upgradeBtn = document.getElementById('upgradeBtn');
        if (currentUser) {
            if (isPremium) {
                badge.style.display = 'inline-block';
                upgradeBtn.style.display = 'none';
            } else {
                badge.style.display = 'none';
                upgradeBtn.style.display = 'inline-block';
            }
        } else {
            badge.style.display = 'none';
            upgradeBtn.style.display = 'none';
        }
    }
    window.upgradeToPremium = async () => {
        if (!currentUser) return alert('Sign in first.');
        await set(ref(db, `users/${currentUser.uid}/premium`), true);
        isPremium = true;
        updatePremiumUI();
        alert('🎉 You are now Premium! Refresh to see pages instantly.');
        loadAllPages();
    };

    function updateUI(user) {
        currentUser = user;
        const userInfo = document.getElementById('userInfo');
        const authForms = document.getElementById('authForms');
        if (user) {
            userInfo.style.display = 'flex';
            authForms.style.display = 'none';
            document.getElementById('userEmailDisplay').textContent = user.email || user.displayName || 'User';
            document.getElementById('userAvatar').src = user.photoURL ||
                `https://ui-avatars.com/api/?name=${encodeURIComponent(user.email || 'U')}&background=3a7bd5&color=fff&size=36`;
            checkPremium(user);
        } else {
            userInfo.style.display = 'none';
            authForms.style.display = 'flex';
            isPremium = false;
        }
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
    }

    onAuthStateChanged(auth, updateUI);

    // Auth functions
    window.signInWithGoogle = async () => {
        const provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); } catch (err) { alert('Google sign in failed: ' + err.message); }
    };
    window.signUpWithEmail = async () => {
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        if (!email || !password) return alert('Enter email and password.');
        try { await createUserWithEmailAndPassword(auth, email, password); } catch (err) { alert('Sign up failed: ' + err.message); }
    };
    window.signInWithEmail = async () => {
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        if (!email || !password) return alert('Enter email and password.');
        try { await signInWithEmailAndPassword(auth, email, password); } catch (err) { alert('Login failed: ' + err.message); }
    };
    window.signOutUser = async () => {
        try { await signOut(auth); } catch (err) { console.error('Sign out error:', err); }
    };

    // File upload: read HTML file and populate textarea
    document.getElementById('htmlFileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const display = document.getElementById('fileNameDisplay');
        if (!file) {
            display.textContent = '';
            return;
        }
        display.textContent = file.name;
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('htmlInput').value = ev.target.result;
            display.textContent = file.name + ' (loaded)';
        };
        reader.onerror = () => {
            alert('Failed to read file.');
            display.textContent = '';
        };
        reader.readAsText(file);
    });

    // Upload function (unchanged logic)
    window.uploadAndStore = async () => {
        const htmlInput = document.getElementById('htmlInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadStatus = document.getElementById('uploadStatus');
        const html = htmlInput.value.trim();
        if (!html) { uploadStatus.innerHTML = '<span class="status-error">❌ Please enter HTML code or select a file.</span>'; return; }
        if (!currentUser) { uploadStatus.innerHTML = '<span class="status-error">❌ Please sign in first.</span>'; return; }
        uploadBtn.disabled = true;
        uploadStatus.innerHTML = '<span class="status-loading">⏳ Uploading to Supabase...</span>';
        try {
            const response = await fetch('/api/storage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ html })
            });
            const data = await response.json();
            if (!response.ok || data.error) throw new Error(data.error || 'Upload failed');
            const publicUrl = data.url;
            uploadStatus.innerHTML = '<span class="status-loading">✅ Uploaded! Saving to Firebase...</span>';
            await push(ref(db, 'pages'), {
                url: publicUrl,
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email || 'Anonymous',
                userPhoto: currentUser.photoURL || null,
                createdAt: serverTimestamp()
            });
            uploadStatus.innerHTML = '<span class="status-success">🎉 Published! Visible worldwide.</span>';
            htmlInput.value = '';
            document.getElementById('fileNameDisplay').textContent = '';
        } catch (err) {
            console.error('Upload error:', err);
            uploadStatus.innerHTML = `<span class="status-error">❌ Error: ${err.message}</span>`;
        } finally {
            uploadBtn.disabled = false;
        }
    };

    // Page card with ads/countdown (exactly as before, unchanged)
    function createPageCard(pageData, isUserPremium) {
        const card = document.createElement('div');
        card.className = 'page-card';

        const adTop = document.createElement('div');
        adTop.className = 'ad-slot ad-top';
        adTop.textContent = 'Ad Slot 1';

        const adBottom = document.createElement('div');
        adBottom.className = 'ad-slot ad-bottom';
        adBottom.textContent = 'Ad Slot 2';

        const timerContainer = document.createElement('div');
        timerContainer.className = 'countdown-container';
        const timerText = document.createElement('div');
        timerText.className = 'timer-text';
        const skipBtn = document.createElement('button');
        skipBtn.className = 'skip-btn';
        skipBtn.textContent = 'Skip & Upgrade';
        skipBtn.onclick = () => window.upgradeToPremium();
        timerContainer.appendChild(timerText);
        timerContainer.appendChild(skipBtn);

        const iframe = document.createElement('iframe');
        iframe.src = '';
        iframe.sandbox = 'allow-scripts';
        iframe.loading = 'lazy';
        iframe.style.display = 'none';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'page-card-info';
        infoDiv.innerHTML = `
            <div class="user">
                <img src="${pageData.userPhoto || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(pageData.userName || 'U') + '&background=3a7bd5&color=fff&size=24'}" 
                     alt="avatar" onerror="this.src='https://ui-avatars.com/api/?name=U&background=3a7bd5&color=fff&size=24'">
                <span>${escapeHtml(pageData.userName || 'Anonymous')}</span>
            </div>
            <a href="${escapeHtml(pageData.url)}" target="_blank" rel="noopener">🔗 Open full page</a>
        `;

        card.appendChild(adTop);
        card.appendChild(timerContainer);
        card.appendChild(adBottom);
        card.appendChild(iframe);
        card.appendChild(infoDiv);

        if (isUserPremium) {
            adTop.style.display = 'none';
            adBottom.style.display = 'none';
            timerContainer.style.display = 'none';
            iframe.src = pageData.url;
            iframe.style.display = 'block';
            return card;
        }

        let countdown = 10;
        let timerInterval = null;
        let isVisible = false;
        let finished = false;
        timerText.textContent = `Loading in ${countdown}s...`;
        iframe.src = pageData.url;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                isVisible = entry.isIntersecting;
                if (isVisible && !finished && countdown > 0) startTimer();
                else stopTimer();
            });
        }, { threshold: 0.1 });
        observer.observe(card);

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    finished = true;
                    adTop.style.display = 'none';
                    adBottom.style.display = 'none';
                    timerContainer.style.display = 'none';
                    iframe.style.display = 'block';
                } else {
                    timerText.textContent = `Loading in ${countdown}s...`;
                }
            }, 1000);
        }
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        card._observer = observer;
        card._stopTimer = stopTimer;
        return card;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function loadAllPages() {
        const pagesGrid = document.getElementById('pagesGrid');
        pagesGrid.querySelectorAll('.page-card').forEach(card => {
            if (card._observer) card._observer.disconnect();
            if (card._stopTimer) card._stopTimer();
        });
        onValue(ref(db, 'pages'), (snapshot) => {
            const data = snapshot.val();
            pagesGrid.innerHTML = '';
            if (!data) {
                pagesGrid.innerHTML = '<div class="empty-state">📭 No pages yet. Be the first to publish one!</div>';
                return;
            }
            const pages = Object.entries(data).reverse();
            pages.forEach(([key, page]) => {
                pagesGrid.appendChild(createPageCard(page, isPremium));
            });
        }, (err) => {
            console.error('Firebase read error:', err);
            pagesGrid.innerHTML = '<div class="empty-state">⚠️ Failed to load pages.</div>';
        });
    }

    loadAllPages();
</script>
</body>
</html>
