<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Image Uploader</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --card-bg: #1a1a24;
            --card-border: #2a2a3a;
            --text: #e8e8ed;
            --text-secondary: #a0a0b4;
            --accent: #3ecf8e;
            --accent-hover: #2fb878;
            --accent-glow: rgba(62, 207, 142, 0.3);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(62, 207, 142, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            backdrop-filter: blur(10px);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3ecf8e, #24b47e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .logo-text h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #fff;
            line-height: 1.2;
        }

        .logo-text span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .drop-zone {
            border: 2px dashed var(--card-border);
            border-radius: var(--radius);
            padding: 44px 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            background: rgba(255, 255, 255, 0.015);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .drop-zone:hover {
            border-color: #4a4a5e;
            background: rgba(255, 255, 255, 0.03);
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(62, 207, 142, 0.06);
            box-shadow: 0 0 40px var(--accent-glow);
            transform: scale(1.01);
        }

        .drop-zone.has-file {
            border-color: var(--accent);
            border-style: solid;
            background: rgba(62, 207, 142, 0.04);
            padding: 20px;
        }

        .drop-icon {
            font-size: 48px;
            opacity: 0.7;
            transition: all var(--transition);
        }
        .drop-zone.drag-over .drop-icon {
            opacity: 1;
            transform: translateY(-4px);
        }

        .drop-text {
            font-weight: 600;
            font-size: 1rem;
            color: #ccc;
        }
        .drop-subtext {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .file-input {
            display: none;
        }

        .preview-container {
            display: none;
            margin-top: 16px;
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #111118;
            border: 1px solid var(--card-border);
        }
        .preview-container.active {
            display: block;
        }
        .preview-container img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            display: block;
            background: #0a0a10;
        }
        .preview-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            gap: 10px;
            flex-wrap: wrap;
        }
        .preview-info .file-name {
            font-weight: 600;
            color: #ddd;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .preview-info .file-size {
            flex-shrink: 0;
        }
        .btn-remove {
            background: none;
            border: 1px solid #444;
            color: #bbb;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .btn-remove:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            font-family: var(--font);
            letter-spacing: -0.01em;
            width: 100%;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-primary:disabled:hover {
            background: var(--accent);
            transform: none;
            box-shadow: none;
        }

        .upload-btn-wrapper {
            margin-top: 16px;
        }

        .progress-wrapper {
            display: none;
            margin-top: 14px;
        }
        .progress-wrapper.active {
            display: block;
        }
        .progress-bar-outer {
            height: 6px;
            background: #2a2a3a;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .progress-text {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .result-area {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: rgba(62, 207, 142, 0.06);
            border: 1px solid rgba(62, 207, 142, 0.25);
            border-radius: var(--radius-sm);
            animation: fadeInUp 0.35s ease;
        }
        .result-area.active {
            display: block;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-url-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0a0a10;
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #2a2a3a;
            word-break: break-all;
        }
        .result-url {
            flex: 1;
            font-size: 0.82rem;
            color: #ccc;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            word-break: break-all;
            user-select: all;
        }
        .btn-copy {
            flex-shrink: 0;
            background: #2a2a3a;
            border: none;
            color: #ddd;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: var(--font);
        }
        .btn-copy:hover {
            background: #3a3a50;
            color: #fff;
        }
        .btn-copy.copied {
            background: var(--accent);
            color: #000;
        }

        .error-area {
            display: none;
            margin-top: 14px;
            padding: 14px;
            background: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            color: #fca5a5;
            font-size: 0.85rem;
            animation: fadeInUp 0.35s ease;
        }
        .error-area.active {
            display: block;
        }
        .error-area strong {
            display: block;
            margin-bottom: 4px;
            color: #ef4444;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e1e2e;
            color: #fff;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #3a3a50;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            z-index: 1000;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: var(--accent);
            box-shadow: 0 12px 40px var(--accent-glow);
        }
        .toast.error {
            border-color: #ef4444;
            box-shadow: 0 12px 40px rgba(239,68,68,0.3);
        }

        .setup-note {
            margin-top: 20px;
            padding: 14px 16px;
            background: rgba(255,180,50,0.06);
            border: 1px solid rgba(255,180,50,0.2);
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            color: #e0c080;
            line-height: 1.5;
            display: none;
        }
        .setup-note.active {
            display: block;
        }
        .setup-note code {
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #f0d080;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .card { padding: 24px 16px; border-radius: 14px; }
            .drop-zone { padding: 30px 16px; min-height: 150px; }
            .drop-icon { font-size: 36px; }
            .drop-text { font-size: 0.9rem; }
            .result-url-box { flex-direction: column; align-items: stretch; }
            .btn-copy { text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo-area">
            <div class="logo-icon">📤</div>
            <div class="logo-text">
                <h1>Image Uploader</h1>
                <span>Upload to Supabase Storage</span>
            </div>
        </div>

        <div class="drop-zone" id="dropZone">
            <span class="drop-icon">🖼️</span>
            <span class="drop-text">Drag & drop an image here</span>
            <span class="drop-subtext">or click to browse — JPG, PNG, GIF, WebP, SVG (max 10MB)</span>
            <input type="file" class="file-input" id="fileInput" accept="image/*">
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="previewImage" src="" alt="Preview">
            <div class="preview-info">
                <span class="file-name" id="previewFileName"></span>
                <span class="file-size" id="previewFileSize"></span>
                <button class="btn-remove" id="btnRemove">✕ Remove</button>
            </div>
        </div>

        <div class="upload-btn-wrapper">
            <button class="btn btn-primary" id="btnUpload" disabled>
                <span id="btnUploadText">Select an Image</span>
                <span id="btnUploadSpinner" style="display:none;"><span class="spinner"></span></span>
            </button>
        </div>

        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">Uploading...</div>
        </div>

        <div class="error-area" id="errorArea">
            <strong>⚠️ Upload Failed</strong>
            <span id="errorMessage"></span>
        </div>

        <div class="setup-note" id="setupNote">
            <strong>📋 Setup Required:</strong> Make sure your bucket <code>sites</code> is <strong>public</strong> and has RLS policies to allow uploads. See SQL examples in console.
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-label">✅ Image URL</div>
            <div class="result-url-box">
                <span class="result-url" id="resultUrl"></span>
                <button class="btn-copy" id="btnCopy">📋 Copy</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        const SUPABASE_URL = 'https://oplxgrrpugpsabvvfoqs.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_4JJaPfnLDpztVwomcvTqCg_dDn6a6tG';
        const BUCKET_NAME = 'sites';   // ✅ Now uses your actual bucket name
        const MAX_FILE_SIZE = 10 * 1024 * 1024;
        const ALLOWED_TYPES = ['image/jpeg','image/png','image/gif','image/webp','image/svg+xml','image/bmp','image/x-icon','image/tiff'];

        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
            console.log('✅ Supabase client ready. Bucket:', BUCKET_NAME);
        } catch(err) {
            console.error('Supabase init error:', err);
            showError('Failed to initialize Supabase client.');
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const previewFileName = document.getElementById('previewFileName');
        const previewFileSize = document.getElementById('previewFileSize');
        const btnRemove = document.getElementById('btnRemove');
        const btnUpload = document.getElementById('btnUpload');
        const btnUploadText = document.getElementById('btnUploadText');
        const btnUploadSpinner = document.getElementById('btnUploadSpinner');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const errorArea = document.getElementById('errorArea');
        const errorMessage = document.getElementById('errorMessage');
        const setupNote = document.getElementById('setupNote');
        const resultArea = document.getElementById('resultArea');
        const resultUrl = document.getElementById('resultUrl');
        const btnCopy = document.getElementById('btnCopy');
        const toast = document.getElementById('toast');

        let selectedFile = null;

        dropZone.addEventListener('click', (e) => { if(e.target !== btnRemove) fileInput.click(); });
        fileInput.addEventListener('change', (e) => { if(e.target.files[0]) handleFileSelect(e.target.files[0]); fileInput.value = ''; });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if(e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
        });
        btnRemove.addEventListener('click', (e) => { e.stopPropagation(); clearSelection(); });
        btnUpload.addEventListener('click', () => { if(selectedFile) uploadFile(selectedFile); });
        btnCopy.addEventListener('click', () => copyToClipboard(resultUrl.textContent));

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if(!items) return;
            for(const item of items) {
                if(item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    if(file) { e.preventDefault(); handleFileSelect(file); }
                    break;
                }
            }
        });

        function handleFileSelect(file) {
            if(!ALLOWED_TYPES.includes(file.type)) { showError(`Invalid file type: ${file.type}`); return; }
            if(file.size > MAX_FILE_SIZE) { showError(`File too large: ${formatFileSize(file.size)}. Max ${formatFileSize(MAX_FILE_SIZE)}`); return; }
            selectedFile = file;
            clearMessages();
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.classList.add('active');
                dropZone.classList.add('has-file');
                dropZone.querySelector('.drop-icon').textContent = '✅';
                dropZone.querySelector('.drop-text').textContent = 'Image selected';
                dropZone.querySelector('.drop-subtext').textContent = 'Click "Upload" or drag new';
            };
            reader.readAsDataURL(file);
            previewFileName.textContent = file.name;
            previewFileSize.textContent = formatFileSize(file.size);
            btnUpload.disabled = false;
            btnUploadText.textContent = '🚀 Upload Image';
        }

        function clearSelection() {
            selectedFile = null;
            previewImage.src = '';
            previewContainer.classList.remove('active');
            dropZone.classList.remove('has-file');
            dropZone.querySelector('.drop-icon').textContent = '🖼️';
            dropZone.querySelector('.drop-text').textContent = 'Drag & drop an image here';
            dropZone.querySelector('.drop-subtext').textContent = 'or click to browse — JPG, PNG, GIF, WebP, SVG (max 10MB)';
            previewFileName.textContent = '';
            previewFileSize.textContent = '';
            btnUpload.disabled = true;
            btnUploadText.textContent = 'Select an Image';
            clearMessages();
            fileInput.value = '';
        }

        function clearMessages() {
            errorArea.classList.remove('active'); errorMessage.textContent = '';
            setupNote.classList.remove('active');
            resultArea.classList.remove('active'); resultUrl.textContent = '';
            progressWrapper.classList.remove('active'); progressBar.style.width = '0%'; progressText.textContent = 'Uploading...';
        }

        async function uploadFile(file) {
            if(!supabase) { showError('Supabase client not ready.'); return; }
            clearMessages();
            setUploading(true);
            const now = new Date();
            const dateFolder = now.toISOString().split('T')[0];
            const timestamp = Date.now();
            const randomStr = Math.random().toString(36).substring(2,8);
            const ext = file.name.split('.').pop() || 'png';
            const safeFileName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const filePath = `uploads/${dateFolder}/${timestamp}-${randomStr}-${safeFileName}`;

            simulateProgress();
            try {
                const { data, error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(filePath, file, { cacheControl: '31536000', upsert: false, contentType: file.type });

                if(error) throw error;

                const { data: urlData } = supabase.storage.from(BUCKET_NAME).getPublicUrl(filePath);
                const publicUrl = urlData?.publicUrl;
                if(!publicUrl) throw new Error('Could not retrieve public URL. Is the bucket public?');

                completeProgress();
                resultUrl.textContent = publicUrl;
                resultArea.classList.add('active');
                showToast('✅ Image uploaded successfully!', 'success');
                console.log('🔗 Public URL:', publicUrl);
            } catch(error) {
                completeProgress();
                setUploading(false);
                let msg = error.message || 'Unknown error';
                if(msg.includes('Bucket') && msg.includes('not found')) {
                    msg = `Bucket "<strong>sites</strong>" not found. Create it in Supabase Storage.`;
                    setupNote.classList.add('active');
                } else if(msg.includes('policy') || msg.includes('not authorized')) {
                    msg += ' <br><br>🔐 Add RLS policies to allow uploads (see console).';
                    setupNote.classList.add('active');
                }
                showError(msg);
            }
        }

        function setUploading(v) {
            btnUpload.disabled = v || !selectedFile;
            btnUploadText.textContent = v ? 'Uploading...' : (selectedFile ? '🚀 Upload Image' : 'Select an Image');
            btnUploadSpinner.style.display = v ? 'inline-block' : 'none';
            if(v) { progressWrapper.classList.add('active'); progressBar.style.width = '0%'; }
        }
        function simulateProgress() {
            let w = 0;
            const iv = setInterval(() => {
                if(w >= 90) { clearInterval(iv); return; }
                w = Math.min(90, w + Math.max(1, (90-w)/15));
                progressBar.style.width = w+'%';
                progressText.textContent = `Uploading... ${Math.round(w)}%`;
            }, 200);
            progressBar._simInterval = iv;
        }
        function completeProgress() {
            if(progressBar._simInterval) { clearInterval(progressBar._simInterval); progressBar._simInterval = null; }
            progressBar.style.width = '100%'; progressText.textContent = '✅ Complete!';
            setTimeout(() => { progressWrapper.classList.remove('active'); progressBar.style.width = '0%'; }, 1500);
        }
        function showError(msg) {
            setUploading(false);
            if(progressBar._simInterval) { clearInterval(progressBar._simInterval); progressBar._simInterval = null; }
            progressWrapper.classList.remove('active');
            errorMessage.innerHTML = msg;
            errorArea.classList.add('active');
            resultArea.classList.remove('active');
            showToast('❌ Upload failed', 'error');
        }
        function showToast(msg, type='') {
            toast.textContent = msg; toast.className = 'toast '+type+' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2800);
        }
        function copyToClipboard(text) {
            if(!text) return;
            if(navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    btnCopy.textContent = '✅ Copied!'; btnCopy.classList.add('copied');
                    showToast('📋 Copied!', 'success');
                    setTimeout(() => { btnCopy.textContent = '📋 Copy'; btnCopy.classList.remove('copied'); }, 2000);
                }).catch(() => fallbackCopy(text));
            } else fallbackCopy(text);
        }
        function fallbackCopy(text) {
            const ta = document.createElement('textarea'); ta.value = text;
            ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            btnCopy.textContent = '✅ Copied!'; btnCopy.classList.add('copied');
            showToast('📋 Copied!', 'success');
            setTimeout(() => { btnCopy.textContent = '📋 Copy'; btnCopy.classList.remove('copied'); }, 2000);
            document.body.removeChild(ta);
        }
        function formatFileSize(b) {
            if(b<1024) return b+' B';
            if(b<1048576) return (b/1024).toFixed(1)+' KB';
            return (b/1048576).toFixed(2)+' MB';
        }
        btnUpload.disabled = true;
    })();
</script>
</body>
</html>
